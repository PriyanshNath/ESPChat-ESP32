<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ESPChat</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<!-- LOGIN -->

<div id="loginScreen">

    <div class="loginBox">

        <h1>💬 ESPChat</h1>

        <input
        id="loginName"
        placeholder="Enter Username"
        maxlength="20"
        autocomplete="nickname">

        <button id="joinButton" type="button">
            Join Chat
        </button>

        <div id="loginError" role="status" aria-live="polite"></div>

    </div>

</div>

<!-- CHAT -->

<div id="chatScreen">

<header>

    <div class="logo">
        💬 ESPChat
    </div>

    <div class="headerActions">

        <div id="connectionStatus">
            🔴 Disconnected • <span id="onlineCount">0</span> Online
        </div>

        <button id="logoutButton" class="logoutButton" type="button">
            Logout
        </button>

    </div>

</header>

<div class="main">

    <div id="sidebar">

        <h3>Online Users</h3>

        <div id="users"></div>

    </div>

    <div class="chatArea">

        <div id="chat"></div>

        <div id="typingIndicator"></div>

    </div>

</div>

<div class="bottom">

<button
id="attachButton"
class="attachButton"
type="button"
aria-label="Share a file"
title="Share a file (maximum 200 KB)">

📎

</button>

<input id="fileInput" type="file" hidden>

<div id="uploadStatus" role="status" aria-live="polite"></div>

<button
id="emojiToggle"
class="emojiToggle"
type="button"
aria-label="Open emoji picker"
aria-expanded="false">

😊

</button>

<div id="emojiPicker" class="emojiPicker" hidden>

    <button type="button" data-emoji="😀">😀</button>
    <button type="button" data-emoji="😂">😂</button>
    <button type="button" data-emoji="😍">😍</button>
    <button type="button" data-emoji="😎">😎</button>
    <button type="button" data-emoji="🤔">🤔</button>
    <button type="button" data-emoji="😢">😢</button>
    <button type="button" data-emoji="😡">😡</button>
    <button type="button" data-emoji="👍">👍</button>
    <button type="button" data-emoji="👏">👏</button>
    <button type="button" data-emoji="🙏">🙏</button>
    <button type="button" data-emoji="❤️">❤️</button>
    <button type="button" data-emoji="🔥">🔥</button>
    <button type="button" data-emoji="🎉">🎉</button>
    <button type="button" data-emoji="✅">✅</button>
    <button type="button" data-emoji="🚀">🚀</button>
    <button type="button" data-emoji="💬">💬</button>

</div>

<input
id="message"
placeholder="Type a message...">

<button class="sendButton" onclick="send()" aria-label="Send message">

➤

</button>

</div>

</div>

<script src="script.js"></script>

</body>

</html>
